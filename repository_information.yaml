      apps/biz/btalk: "비즈니스 BTalk 앱"
      apps/biz/share: "비즈니스 공유 모듈"
      apps/core/share: "코어 공유 모듈"

  dworks-ui-guestzone:
    description: "DWorks Guestzone UI 애플리케이션 (프론트엔드)"
    type: "frontend"
    note: "실제 소스는 guestzone-boot/src/main/webapp/ 하위에 위치"
    modules:
