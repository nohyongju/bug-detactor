  dworks-thirdparty:
    description: "DWorks 써드파티 연동 (메신저, 대화, 비즈니스, 프로필)"
    type: "backend"
    domains: [써드파티 통합, 비즈니스 연동, 대화 연동, 메신저 연동, 프로필 연동]
    modules:
      business: "비즈니스 써드파티 연동"
      conversation: "대화 써드파티 연동"
      messenger: "메신저 써드파티 연동"
      profile: "프로필 써드파티 연동"

