repos:

  # ── ATTIC Core Asset (인프라/공통 서비스) ─────────────────

  attic-core-asset-buzzer:
    description: "클라이언트에 실시간 이벤트 푸시를 담당하는 WebSocket 서비스"
    type: "backend"
    domains: [WebSocket, STOMP, SockJS, 실시간 이벤트 푸시, 클라이언트 연결 관리]
    modules:
      buzzer-service: "연결/메시징/보안/세션/WebSocket 비즈니스 로직"
      buzzer-adapter: "Kafka, WebSocket 어댑터"
      buzzer-domain: "도메인 모델 및 메시징 토픽 정의"

  attic-core-asset-depot:
    description: "파일 리소스 저장소 (로컬 파일시스템 / S3 멀티스토어)"
    type: "backend"
    domains: [파일 업로드/다운로드, 버킷 관리, ACL 접근권한, S3, 로컬 파일시스템]
    modules:
      depot-service: "파일/버킷/ACL 비즈니스 로직"
      depot-store-file: "로컬 파일시스템 스토어"
      depot-store-s3: "S3 스토어"
      depot-domain: "파일 리소스 도메인"

  attic-core-asset-ecosystem:
    description: "Config, API Gateway, Service Registry 등 핵심 인프라 시스템"
    type: "infra"
    domains: [서비스 발견, 서비스 레지스트리, API 라우팅, 시스템 관리]
    modules:
      registry: "서비스 레지스트리 (서비스 발견)"
      apigateway: "API 게이트웨이 (라우팅)"
      admin: "관리 콘솔"

  attic-core-asset-messaging:
    description: "채팅 및 메시징 API를 제공하는 메시지 플랫폼"
    type: "backend"
    domains: [채팅, 메시지, 스레드 대화, 토픽 관리, 애플리케이션 채널]
    modules:
      messaging-component: "핵심 컴포넌트 (application, channel, chatting, thread, topic)"
      messaging-share: "공유 라이브러리"

  attic-core-asset-resource:
    description: "리소스 관리 모듈"
    type: "backend"
    domains: [리소스 관리]

  attic-core-asset-scheduler:
    description: "등록된 job을 주기적으로 실행하는 스케줄러 (Quartz / JobRunr)"
    type: "backend"
    domains: [스케줄링, Quartz, JobRunr, Kafka Job, REST Job]
    modules:
      scheduler-service: "스케줄 실행 엔진"
      scheduler-engine-quartz: "Quartz 엔진"
      scheduler-engine-jobrunr: "JobRunr 엔진"
      scheduler-store-jpa: "JPA 스토어"

  attic-core-asset-share:
    description: "공유 라이브러리 및 공통 유틸리티 모듈"
    type: "library"

  attic-core-asset-uaa:
    description: "OAuth2 기반 사용자 인증 및 권한 관리"
    type: "backend"
    domains: [OAuth2 Authorization Server, 사용자 인증, 권한 관리, 토큰 발급]
    modules:
      uaa-service: "인증/인가 비즈니스 로직"
      uaa-store-jpa: "JPA 스토어"
      uaa-domain: "사용자/권한 도메인"

  # ── DWorks 비즈니스 서비스 ────────────────────────────────

  dworks-aibiz:
    description: "DWorks AI 비즈니스 로직 (AI Butler, 대화, 데이터 피드)"
    type: "backend"
    domains: [AI Butler, AI 대화, 데이터 피드, 톡 대화, AI 설정, AI 도구]
    modules:
      aibutler: "AI 비서 기능"
      conversation: "대화 관리"
      datafeed: "데이터 피드"
      dialogue: "대화 처리"
      setting: "AI 설정 관리"
      tool: "AI 도구"

  dworks-bff:
    description: "DWorks UI를 위한 Backend for Frontend"
    type: "backend"
    domains: [감사 로그, 자동완성, 커넥터, 매크로, 회원 관리, 메뉴, 메시지, 메타데이터, 역할 그룹]
    modules:
      audit: "감사 로그 (Elastic 저장)"
      autocomplete: "자동완성"
      linker-connector: "링커 커넥터"
      macro: "매크로"
      member: "회원"
      menu: "메뉴"
      message: "메시지"
      metadata: "메타데이터"
      rolegroup: "역할 그룹"

  dworks-bizasset:
    description: "DWorks 핵심 비즈니스 에셋 (티켓, 사용자, 워크플로우 등 27개 컴포넌트)"
    type: "backend"
    domains: [액션 로그, 애플리케이션, 인증, 비즈니스 폼, 센터, FAQ, 나이스베이스, 라이선스, 역할, 팀, 티켓, 사용자, 워크플로우]
    modules:
      actionlog: "액션 로그"
      application: "애플리케이션"
      auth: "인증"
      bizform: "비즈니스 폼"
      center: "센터 관리"
      faq: "FAQ"
      knowledge: "나이스베이스"
      license: "라이선스"
      role: "역할"
      team: "팀"
      ticket: "티켓"
      user: "사용자"
      workflow: "워크플로우"

  dworks-cstalk:
    description: "CS Talk 메인 서비스 (상담 톡, 배정, AI 에이전트 등 29개 컴포넌트)"
    type: "backend"
    domains: [AI 에이전트, 답변 대기열, 승인, 배정, 자동 메시지, 봇 히스토리, FAQ 에이전트, 게스트, 회원, 수신, 번역, 화상톡, 대기 톡]
    modules:
      aiagent: "AI 에이전트"
      answerqueue: "답변 대기열"
      assign: "배정"
      automessage: "자동 메시지"
      bothistory: "봇 히스토리"
      faqagent: "FAQ 에이전트"
      guest: "게스트 관리"
      member: "회원"
      mytalk: "나의 톡"
      reception: "수신"
      task: "작업"
      videotalk: "화상 톡"
      waitingtalk: "대기 톡"

  dworks-insight:
    description: "Btalk 이벤트 수집/변환/통계 및 모니터링 모듈"
    type: "backend"
    domains: [통계 수집, 데이터 변환, FAQ 모니터링, 티켓 분석, 사용자 활동, 워크 모니터링]
    modules:
      btalk-collector: "B톡 데이터 수집"
      btalk-statistics: "B톡 통계"
      btalk-transform: "B톡 데이터 변환"
      faq-monitor: "FAQ 모니터링"
      faq-statistics: "FAQ 통계"
      ticket: "티켓 분석"
      useractivity: "사용자 활동"
      work-monitor: "워크 모니터링"

  dworks-portal:
    description: "DWorks 포털 서비스 (Elasticsearch 기반 콘텐츠 관리/검색)"
    type: "backend"
    domains: [포털, 검색, HTML 파싱, 콘텐츠 관리, Elasticsearch]
    modules:
      portal-service: "포털 비즈니스 로직"
