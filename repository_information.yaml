  dworks-ui-workspace:
    description: "Cowork+ 워크스페이스 프론트엔드 모노레포 (React)"
    type: "frontend"
    note: "실제 소스는 workspace-ui/ 하위에 위치"
    modules:
      workspace-app: "워크스페이스 메인 앱"
      workspace-mobile-app: "워크스페이스 모바일 앱"
