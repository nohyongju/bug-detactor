  dworks-ui-partner:
    description: "DWorks Partner UI 애플리케이션 (프론트엔드)"
    type: "frontend"
    note: "실제 소스는 partner-boot/src/main/webapp/ 하위에 위치"
    modules:
      apps/biz/ctalk: "비즈니스 CTalk 앱"
      apps/core/share: "코어 공유 모듈"
